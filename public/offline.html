<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Calmora</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .offline-container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 400px;
    }

    .offline-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }

    h1 {
      color: #1f2937;
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      color: #6b7280;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #fef3c7;
      border-radius: 50px;
      color: #92400e;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #f59e0b;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .retry-button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .retry-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .retry-button:active {
      transform: translateY(0);
    }

    .features-list {
      margin-top: 30px;
      text-align: left;
      padding: 20px;
      background: #f9fafb;
      border-radius: 12px;
    }

    .features-list h3 {
      color: #1f2937;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .features-list ul {
      list-style: none;
      color: #6b7280;
    }

    .features-list li {
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .features-list li::before {
      content: '✓';
      color: #10b981;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    
    <h1>You're Offline</h1>
    
    <div class="status-indicator">
      <span class="status-dot"></span>
      <span>Attempting to reconnect...</span>
    </div>

    <p>
      Don't worry! Your data is saved locally. 
      Calmora will automatically sync when you're back online.
    </p>

    <button class="retry-button" onclick="window.location.reload()">
      🔄 Try Again
    </button>

    <div class="features-list">
      <h3>Available Offline:</h3>
      <ul>
        <li>View your tasks & journals</li>
        <li>Track habits & mood</li>
        <li>Take care of your pet</li>
        <li>Write new entries</li>
        <li>Use Pomodoro timer</li>
      </ul>
    </div>
  </div>

  <script>
    // Auto-retry connection every 10 seconds
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload()
      }
    }, 10000)

    // Listen for online event
    window.addEventListener('online', () => {
      window.location.reload()
    })
  </script>
</body>
</html>
