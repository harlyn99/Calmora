<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calmora - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-1: #6b9f7f;
            --accent-2: #5a8a6a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .login-card {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .login-header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .login-header .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .greeting {
            text-align: center;
            margin-bottom: 32px;
        }

        .greeting p {
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .greeting-icon {
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-primary);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-1);
        }

        .input-wrapper svg {
            color: var(--text-secondary);
            margin-right: 12px;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: var(--text-secondary);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(107, 159, 127, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-toggle button {
            background: none;
            border: none;
            color: var(--accent-1);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-left: 4px;
        }

        .auth-toggle button:hover {
            text-decoration: underline;
        }

        .demo-note {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            background: rgba(107, 159, 127, 0.1);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .error-message {
            background: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>✨ Calmora</h1>
                <p class="subtitle">Your personal productivity sanctuary</p>
            </div>

            <div class="greeting">
                <p>Welcome back, friend</p>
                <p class="greeting-icon">🌙 ☀️ 🌙</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="username" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <div id="error" class="error-message" style="display: none;"></div>

                <button type="submit" class="submit-btn">Sign In</button>
            </form>

            <div class="auth-toggle">
                <p>Don't have an account? <button id="toggleAuth">Sign Up</button></p>
            </div>

            <div class="demo-note">
                💡 Demo: Use any username and password
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const toggleBtn = document.getElementById('toggleAuth');
        const errorDiv = document.getElementById('error');
        let isLogin = true;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            toggleBtn.textContent = isLogin ? 'Sign Up' : 'Sign In';
            document.querySelector('.auth-toggle p').childNodes[0].textContent = 
                isLogin ? "Don't have an account? " : 'Already have an account? ';
            errorDiv.style.display = 'none';
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }

            // Save to localStorage
            localStorage.setItem('user', JSON.stringify({ 
                username, 
                id: Date.now(),
                loggedInAt: new Date().toISOString()
            }));

            // Redirect to dashboard
            window.location.href = '/dashboard.html';
        });

        console.log('✅ Calmora Login loaded successfully!');
    </script>
</body>
</html>
