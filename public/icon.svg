<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="petGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB6C1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Pet body (cute blob shape) -->
  <ellipse cx="256" cy="280" rx="120" ry="100" fill="url(#petGrad)"/>
  
  <!-- Ears -->
  <ellipse cx="180" cy="200" rx="35" ry="50" fill="url(#petGrad)" transform="rotate(-20 180 200)"/>
  <ellipse cx="332" cy="200" rx="35" ry="50" fill="url(#petGrad)" transform="rotate(20 332 200)"/>
  <ellipse cx="180" cy="200" rx="20" ry="30" fill="#FFB6C1" transform="rotate(-20 180 200)"/>
  <ellipse cx="332" cy="200" rx="20" ry="30" fill="#FFB6C1" transform="rotate(20 332 200)"/>
  
  <!-- Eyes (big cute eyes) -->
  <ellipse cx="220" cy="270" rx="25" ry="30" fill="#1f2937"/>
  <ellipse cx="292" cy="270" rx="25" ry="30" fill="#1f2937"/>
  <ellipse cx="228" cy="265" rx="10" ry="12" fill="white"/>
  <ellipse cx="300" cy="265" rx="10" ry="12" fill="white"/>
  
  <!-- Blush -->
  <ellipse cx="195" cy="300" rx="20" ry="12" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="317" cy="300" rx="20" ry="12" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- Mouth (small w shape) -->
  <path d="M 240 310 Q 256 320 272 310" stroke="#1f2937" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Sparkle -->
  <path d="M 380 180 L 385 195 L 400 195 L 388 205 L 393 220 L 380 210 L 367 220 L 372 205 L 360 195 L 375 195 Z" fill="white" opacity="0.8"/>
</svg>
